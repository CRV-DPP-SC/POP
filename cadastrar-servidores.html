<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastrar Servidores — CRV/DPP</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 640px; margin: 3rem auto; padding: 1.5rem; background: #f5f5f3; color: #1a1a1a; }
  h1 { font-size: 1.2rem; color: #0F6E56; margin-bottom: 0.25rem; }
  p { font-size: 0.85rem; color: #555; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; }
  .card-nome { font-weight: 600; font-size: 0.9rem; }
  .card-cpf { font-size: 0.78rem; color: #666; font-family: monospace; }
  .badge { font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .badge-aguard { background: #f0f4ff; color: #333; border: 1px solid #c7d2fe; }
  .badge-ok { background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97; }
  .badge-erro { background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; }
  .badge-existe { background: #FAEEDA; color: #633806; border: 1px solid #FAC775; }
  #btn { background: #0F6E56; color: #fff; border: none; border-radius: 10px; padding: 0.75rem 2rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 1rem; }
  #btn:disabled { background: #aaa; cursor: not-allowed; }
  #status { font-size: 0.82rem; margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 8px; display: none; }
  .status-ok { background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97; }
  .status-info { background: #E6F1FB; color: #0C447C; border: 1px solid #B5D4F4; }
</style>
</head>
<body>

<h1>🏛️ Carga Inicial de Servidores — CRV/DPP</h1>
<p>Esta página cadastra os 7 servidores do setor no Firebase. Execute <strong>uma única vez</strong>. Se um servidor já existir (mesmo CPF), ele será ignorado automaticamente.</p>

<div id="lista-cards"></div>

<button id="btn" onclick="cadastrarTodos()">▶ Cadastrar servidores no Firebase</button>
<div id="status"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtfo2cXialN7EWi4bBO9LMF2Ez3zz8Lo4",
  authDomain: "crv-dpp-sc.firebaseapp.com",
  projectId: "crv-dpp-sc",
  storageBucket: "crv-dpp-sc.firebasestorage.app",
  messagingSenderId: "707080008192",
  appId: "1:707080008192:web:64f44c65629c0fc5941ee5"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const SERVIDORES = [
  { nome:"RODRIGO LAUX PASTORE",          cpf:"041.830.939-61", matricula:"654163-1-01",   cargo:"POLICIAL PENAL", lotacao:"DEPARTAMENTO DE POLICIA PENAL", municipio:"FLORIANÓPOLIS", celular:"(49) 9.9911-8885", telefone:"", email:"rodrigo.l.pastore@gmail.com",    banco:"BANCO DO BRASIL",          agencia:"0858-3",  conta:"29.773-9"     },
  { nome:"RICARDO DE BRITO MARQUES",       cpf:"060.289.889-79", matricula:"379.682-5-01",  cargo:"POLICIAL PENAL", lotacao:"DEPARTAMENTO DE POLICIA PENAL", municipio:"FLORIANÓPOLIS", celular:"(48) 9.9901-2640", telefone:"", email:"ricardobritomarques12@gmail.com", banco:"CAIXA ECONÔMICA FEDERAL",   agencia:"1011-1",  conta:"24.529-2"     },
  { nome:"IVANA SCHAFER ORTIZ",            cpf:"067.841.269-39", matricula:"951.405-8-05",  cargo:"POLICIAL PENAL", lotacao:"DEPARTAMENTO DE POLICIA PENAL", municipio:"FLORIANÓPOLIS", celular:"(47) 9.8851-7820", telefone:"", email:"ivana.schafer@gmail.com",         banco:"BANCO DO BRASIL",          agencia:"0276-3",  conta:"47.364-2"     },
  { nome:"BRUNA ROBERTA WESSNER LONGEN",   cpf:"050.932.569-60", matricula:"956.090-4-03",  cargo:"POLICIAL PENAL", lotacao:"DEPARTAMENTO DE POLICIA PENAL", municipio:"FLORIANÓPOLIS", celular:"(47) 9.9609-4441", telefone:"", email:"brunawlongen@gmail.com",          banco:"BANCO DO BRASIL",          agencia:"0276-3",  conta:"105.808-8"    },
  { nome:"DAYANNE CHRISTINE SESTREN ROSA", cpf:"059.189.719-98", matricula:"",              cargo:"POLICIAL PENAL", lotacao:"DEPARTAMENTO DE POLICIA PENAL", municipio:"FLORIANÓPOLIS", celular:"(48) 9.8464-9354", telefone:"", email:"day.sestren88@gmail.com",          banco:"NUBANK",                   agencia:"0001",    conta:"30.385.877-7" },
  { nome:"JÉSSICA KARLA VEIGA",            cpf:"",               matricula:"",              cargo:"POLICIAL PENAL", lotacao:"DEPARTAMENTO DE POLICIA PENAL", municipio:"FLORIANÓPOLIS", celular:"(47) 9.9943-4426", telefone:"", email:"jessicaveiga9@gmail.com",          banco:"",                         agencia:"",        conta:""             },
  { nome:"JULIANA DE ANDRADE ABEL",        cpf:"072.961.059-41", matricula:"",              cargo:"POLICIAL PENAL", lotacao:"DEPARTAMENTO DE POLICIA PENAL", municipio:"FLORIANÓPOLIS", celular:"(48) 9.9991-1198", telefone:"", email:"abeljuliana2012@gmail.com",        banco:"BANCO DO BRASIL",          agencia:"0540-1",  conta:"36.071-6"     },
];

// Renderiza cards antes de cadastrar
const lista = document.getElementById('lista-cards');
SERVIDORES.forEach((s, i) => {
  lista.innerHTML += `
    <div class="card" id="card-${i}">
      <div>
        <div class="card-nome">${s.nome}</div>
        <div class="card-cpf">${s.cpf || 'CPF não informado'} · ${s.cargo}</div>
      </div>
      <span class="badge badge-aguard" id="badge-${i}">Aguardando</span>
    </div>`;
});

window.cadastrarTodos = async function() {
  const btn = document.getElementById('btn');
  const statusEl = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Cadastrando...';
  statusEl.style.display = 'block';
  statusEl.className = 'status-info';
  statusEl.textContent = 'Conectando ao Firebase...';

  let ok = 0, pulados = 0, erros = 0;

  for (let i = 0; i < SERVIDORES.length; i++) {
    const s = SERVIDORES[i];
    const badge = document.getElementById(`badge-${i}`);
    badge.className = 'badge badge-aguard';
    badge.textContent = 'Verificando...';

    try {
      // Verifica se já existe pelo nome (evita duplicatas)
      const q = query(collection(db, 'servidores'), where('nome', '==', s.nome));
      const snap = await getDocs(q);

      if (!snap.empty) {
        badge.className = 'badge badge-existe';
        badge.textContent = 'Já existe';
        pulados++;
      } else {
        await addDoc(collection(db, 'servidores'), { ...s, criadoEm: serverTimestamp() });
        badge.className = 'badge badge-ok';
        badge.textContent = '✓ Cadastrado';
        ok++;
      }
    } catch(e) {
      badge.className = 'badge badge-erro';
      badge.textContent = '✕ Erro';
      erros++;
      console.error(s.nome, e);
    }
  }

  btn.textContent = 'Concluído!';
  statusEl.className = erros ? 'status-info' : 'status-ok';
  statusEl.innerHTML = `
    ✓ <strong>${ok} servidor(es) cadastrado(s)</strong>
    ${pulados ? ` · ${pulados} já existia(m) (ignorado)` : ''}
    ${erros ? ` · <span style="color:#A32D2D">${erros} erro(s)</span>` : ''}
    <br><br>Você já pode fechar esta página e usar o sistema de diárias normalmente.`;
};
</script>
</body>
</html>
